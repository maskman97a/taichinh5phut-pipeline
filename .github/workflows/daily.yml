name: Daily YouTube Pipeline

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg + ImageMagick + fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick fonts-dejavu fonts-noto fonts-noto-cjk fonts-roboto fonts-open-sans wget
          # Fix ImageMagick policy ngan TextClip render
          sudo sed -i 's|rights="none" pattern="@\*"|rights="read\|write" pattern="@*"|' /etc/ImageMagick-6/policy.xml || true
          # Verify
          echo "convert: $(which convert)"
          echo "ffmpeg:  $(which ffmpeg)"
          convert -version | head -1
          # Download Montserrat (optional, fallback to Roboto/Noto neu fail)
          mkdir -p /tmp/fonts
          set +e
          wget -q -O /tmp/fonts/Montserrat-ExtraBold.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-ExtraBold.ttf"
          if [ $? -ne 0 ] || [ ! -s /tmp/fonts/Montserrat-ExtraBold.ttf ]; then
            echo "Montserrat ExtraBold download fail - try jsdelivr CDN"
            wget -q -O /tmp/fonts/Montserrat-ExtraBold.ttf "https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/montserrat/static/Montserrat-ExtraBold.ttf"
          fi
          wget -q -O /tmp/fonts/Montserrat-Black.ttf "https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static/Montserrat-Black.ttf"
          if [ $? -ne 0 ] || [ ! -s /tmp/fonts/Montserrat-Black.ttf ]; then
            wget -q -O /tmp/fonts/Montserrat-Black.ttf "https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/montserrat/static/Montserrat-Black.ttf"
          fi
          # Verify - remove empty files
          find /tmp/fonts/ -type f -empty -delete
          echo "Downloaded fonts:"
          ls -la /tmp/fonts/ || true
          set -e
          # Always succeed - we have apt fonts fallback (Roboto, Noto, DejaVu)
          exit 0

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # GROQ_API_KEY da bo - script pre-gen boi Claude trong data/scripts/
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python pipeline/main.py

      - name: Commit updated log
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ideas.json data/published.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Auto update published log"
            git push
          else
            echo "No changes to commit"
          fi
